[variables]
    PHP_EXTENSION_MYSQLI = "1"
    PHP_EXTENSION_PDO_MYSQL = "1"

[phases.setup]
    nixPkgs = ["...", "php82Extensions.mysqli", "php82Extensions.pdo_mysql"]

[phases.build]
    # Only keep this if you actually have a composer.json file
    cmds = ["composer install --no-dev --optimize-autoloader"]

